<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5eaff"/>
      <stop offset="100%" stop-color="#ecdcf7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bg)"/>
  <!-- Gold ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#c9a96e" stroke-width="1"/>
  <!-- Left A -->
  <text x="9.5" y="21.5" font-family="Georgia,serif" font-size="13" fill="#7c5fa0" font-weight="700" text-anchor="middle">A</text>
  <!-- Right A -->
  <text x="22.5" y="21.5" font-family="Georgia,serif" font-size="13" fill="#c49abf" font-weight="700" text-anchor="middle">A</text>
  <!-- Ampersand -->
  <text x="16" y="19" font-family="Georgia,serif" font-size="6" fill="#c9a96e" text-anchor="middle">&amp;</text>
</svg>
